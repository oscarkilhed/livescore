name: CI

on:
  push:
    branches: [ main, open-source-cleanup ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/server/package-lock.json
      
      - name: Install dependencies
        run: |
          cd src/server
          npm ci
      
      - name: Run linter
        run: |
          cd src/server
          npm run lint
      
      - name: Run tests
        run: |
          cd src/server
          npm test

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json
      
      - name: Install dependencies
        run: |
          cd src/client
          npm ci
      
      - name: Run tests
        run: |
          cd src/client
          npm test -- --watchAll=false

  docker-build:
    name: Docker Build Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build nginx image (includes client)
        run: |
          docker build -f Dockerfile.nginx -t livescore-nginx:test .
      
      - name: Build server image
        run: |
          docker build -f Dockerfile.server -t livescore-server:test .
